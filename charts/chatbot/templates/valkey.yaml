apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-valkey
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/component: store
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "chatbot.selectorLabels" (dict "name" "valkey" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/component: store
        {{- include "chatbot.labels" . | nindent 8 }}
    spec:
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}
          command: ['sh', '-c', 'exec valkey-server --requirepass "$VALKEY_PASSWORD"']
          ports:
            - name: valkey
              containerPort: 6379
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatbot-valkey
                  key: VALKEY_PASSWORD
          readinessProbe:
            exec:
              command: ['sh', '-c', 'valkey-cli -a "$VALKEY_PASSWORD" ping | grep -q PONG']
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-valkey
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/component: store
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "chatbot.selectorLabels" (dict "name" "valkey" "release" .Release.Name) | nindent 4 }}
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
