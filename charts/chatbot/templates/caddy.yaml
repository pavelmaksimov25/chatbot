apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-caddy
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: ingress
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "chatbot.selectorLabels" (dict "name" "caddy" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: caddy
        app.kubernetes.io/component: ingress
        {{- include "chatbot.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/caddy-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: caddy
          image: {{ .Values.caddy.image }}
          ports:
            - name: https
              containerPort: 443
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.caddy.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-caddy-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-caddy
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: ingress
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "chatbot.selectorLabels" (dict "name" "caddy" "release" .Release.Name) | nindent 4 }}
  ports:
    - name: https
      port: 443
      targetPort: https
      nodePort: {{ .Values.caddy.nodePort }}
