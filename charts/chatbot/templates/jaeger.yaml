{{- /*
Jaeger all-in-one: OTLP ingest + UI, in-memory storage — local-only tracing
backend. The services export OTLP/HTTP spans to port 4318.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: observability
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "chatbot.selectorLabels" (dict "name" "jaeger" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: observability
        {{- include "chatbot.labels" . | nindent 8 }}
    spec:
      containers:
        - name: jaeger
          image: {{ .Values.observability.jaeger.image }}
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: 'true'
            - name: MEMORY_MAX_TRACES
              value: {{ .Values.observability.jaeger.maxTraces | quote }}
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: ui
              containerPort: 16686
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.observability.jaeger.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: observability
    {{- include "chatbot.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "chatbot.selectorLabels" (dict "name" "jaeger" "release" .Release.Name) | nindent 4 }}
  ports:
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: ui
      port: 16686
      targetPort: ui
