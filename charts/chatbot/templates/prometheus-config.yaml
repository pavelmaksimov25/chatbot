apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    {{- include "chatbot.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: chatbot-services
        static_configs:
          - targets:
    {{- range $name, $svc := .Values.services }}
              - {{ $.Release.Name }}-{{ $name }}:{{ $svc.port }}
    {{- end }}
