{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "chatbot.labels" $ | nindent 4 }}
spec:
  replicas: {{ $.Values.replicas }}
  selector:
    matchLabels:
      {{- include "chatbot.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "chatbot.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.repositoryPrefix }}/{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
            {{- if $svc.grpcPort }}
            - name: grpc
              containerPort: {{ $svc.grpcPort }}
            {{- end }}
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: {{ $name }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ tpl $.Values.observability.otlpEndpoint $ }}
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ tpl $val $ | quote }}
            {{- end }}
            {{- range $key, $ref := $svc.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secret }}
                  key: {{ $ref.key }}
            {{- end }}
            {{- if $svc.db }}
            - name: DB_HOST
              value: {{ $.Release.Name }}-postgres
            - name: DB_PORT
              value: '5432'
            - name: DB_USER
              value: {{ $svc.db.user }}
            - name: DB_NAME
              value: {{ $svc.db.name }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatbot-postgres
                  key: {{ $svc.db.passwordKey }}
            {{- end }}
            {{- if $svc.valkey }}
            - name: VALKEY_HOST
              value: {{ $.Release.Name }}-valkey
            - name: VALKEY_PORT
              value: '6379'
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatbot-valkey
                  key: VALKEY_PASSWORD
            {{- end }}
            {{- if $svc.minio }}
            - name: MINIO_ENDPOINT
              value: http://{{ $.Release.Name }}-minio:9000
            {{- end }}
            {{- if $svc.vault }}
            - name: VAULT_ADDR
              value: http://{{ $.Release.Name }}-vault:8200
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "chatbot.labels" $ | nindent 4 }}
spec:
  selector:
    {{- include "chatbot.selectorLabels" (dict "name" $name "release" $.Release.Name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
    {{- if $svc.grpcPort }}
    - name: grpc
      port: {{ $svc.grpcPort }}
      targetPort: grpc
    {{- end }}
{{- end }}
