apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-caddy-config
  labels:
    app.kubernetes.io/name: caddy
    {{- include "chatbot.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {
    	admin off
    }

    https://localhost {
    	tls internal

    	# Skeleton-only verification routes: prove every service answers through
    	# the ingress. Real traffic goes to the BFF only — remove these when real
    	# routing lands.
    {{- range $name, $svc := .Values.services }}
    	handle /healthz/{{ $name }}* {
    		uri replace /healthz/{{ $name }} /health
    		reverse_proxy {{ $.Release.Name }}-{{ $name }}:{{ $svc.port }}
    	}
    {{- end }}

    	handle {
    		reverse_proxy {{ .Release.Name }}-bff-gateway:{{ (get .Values.services "bff-gateway").port }}
    	}
    }
