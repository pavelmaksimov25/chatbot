image:
  repositoryPrefix: chatbot
  tag: dev
  # Images are built locally and `kind load`ed — never pulled from a registry.
  pullPolicy: Never

replicas: 1

# Store flags drive the env wiring in templates/services.yaml. Each service
# may reach ONLY its own stores: db.user/db.name bind it to its own logical
# database — never point two services at the same one.
services:
  bff-gateway:
    port: 3000
    valkey: true
    env:
      API_URL: 'http://{{ .Release.Name }}-api:3001'
      APP_BASE_URL: 'https://localhost:8443'
    secretEnv:
      AUTH0_DOMAIN: { secret: chatbot-auth0, key: AUTH0_DOMAIN }
      AUTH0_CLIENT_ID: { secret: chatbot-auth0, key: AUTH0_CLIENT_ID }
      AUTH0_CLIENT_SECRET: { secret: chatbot-auth0, key: AUTH0_CLIENT_SECRET }
      SESSION_SECRET: { secret: chatbot-auth0, key: SESSION_SECRET }
  api:
    port: 3001
    valkey: true
    minio: true
    vault: true
    db:
      user: api
      name: conversations_db
      passwordKey: API_DB_PASSWORD
    env:
      USER_SERVICE_GRPC_URL: '{{ .Release.Name }}-user-service:50051'
      LLM_MODEL: claude-sonnet-4-6
    secretEnv:
      ANTHROPIC_API_KEY: { secret: chatbot-llm, key: ANTHROPIC_API_KEY }
      OPENAI_API_KEY: { secret: chatbot-llm, key: OPENAI_API_KEY }
      GEMINI_API_KEY: { secret: chatbot-llm, key: GEMINI_API_KEY }
      VAULT_TOKEN: { secret: chatbot-vault, key: VAULT_DEV_ROOT_TOKEN }
      MINIO_ACCESS_KEY: { secret: chatbot-minio, key: MINIO_ROOT_USER }
      MINIO_SECRET_KEY: { secret: chatbot-minio, key: MINIO_ROOT_PASSWORD }
  user-service:
    port: 3002
    grpcPort: 50051
    valkey: true
    db:
      user: user_service
      name: users_db
      passwordKey: USER_SERVICE_DB_PASSWORD

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

caddy:
  image: caddy:2-alpine
  nodePort: 30443
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

postgres:
  image: postgres:17-alpine
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

valkey:
  image: valkey/valkey:8-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

minio:
  image: minio/minio:latest
  storage: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

vault:
  image: hashicorp/vault:1.20
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

observability:
  # OTLP/HTTP traces from every service land here (rendered with tpl).
  otlpEndpoint: 'http://{{ .Release.Name }}-jaeger:4318'
  jaeger:
    image: jaegertracing/all-in-one:1.60
    # All-in-one keeps spans in memory; uncapped it grows into the limit below
    # and OOMs, wedging the readiness probe. Bound the ring buffer instead.
    maxTraces: 20000
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
  prometheus:
    image: prom/prometheus:v3.5.0
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
  grafana:
    image: grafana/grafana:11.6.0
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
